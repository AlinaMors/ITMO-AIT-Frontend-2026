<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InjectincoPlayground - Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-warning" href="dashboard.html">
        <i class="bi bi-robot"></i> InjectincoPlayground
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Дашборд</a></li>
          <li class="nav-item"><a class="nav-link" href="agents.html">Агенты и Фильтры</a></li>
          <li class="nav-item"><a class="nav-link" href="main-chat.html">Симуляция</a></li>
        </ul>
        <div class="d-flex align-items-center">
          <a href="login.html" class="btn btn-light active">Вход</a>
          <a href="register.html" class="btn btn-primary ms-2">Регистрация</a>
          <button onclick="toggleTheme()" class="btn btn-outline-warning ms-3" id="theme-btn" aria-label="Сменить тему">
            <i class="bi bi-moon"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body text-center">
            <i class="bi bi-shield-lock text-primary fs-1"></i>
            <h3 class="mt-2 mb-4">Вход в систему</h3>
            <form onsubmit="handleLogin(event)">
              <div class="mb-3 text-start">
                <label class="form-label" for="loginEmail">Email адрес</label>
                <input type="email" class="form-control" name="email" id="loginEmail" required>
              </div>
              <div class="mb-4 text-start">
                <label class="form-label" for="loginPassword">Пароль</label>
                <input type="password" class="form-control" name="password" id="loginPassword" required>
              </div>
              <button class="btn btn-primary w-100 mb-3" type="submit">Войти</button>
              <a href="register.html">Зарегистрироваться</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
