<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InjectincoPlayground - Личный кабинет</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-warning" href="dashboard.html">
        <i class="bi bi-robot"></i> InjectincoPlayground
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">Дашборд</a></li>
          <li class="nav-item"><a class="nav-link" href="agents.html">Агенты и Фильтры</a></li>
          <li class="nav-item"><a class="nav-link" href="main-chat.html">Симуляция</a></li>
        </ul>
        <div class="text-light">
          <span id="username"></span>
          <button onclick="logout()" class="btn btn-danger ms-3">Выход</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row mb-4">
      <div class="col-6">
        <h2>Управление симуляциями</h2>
      </div>
      <div class="col-6 text-end">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createModal">Создать новую симуляцию</button>
      </div>
    </div>

    <div class="row" id="simulations-container">
    </div>
  </div>

  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Создать симуляцию</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form onsubmit="createSimulation(event)">
            <div class="mb-3">
              <label class="form-label">Название</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Статус</label>
              <select name="status" class="form-select">
                <option value="Активно">Активно</option>
                <option value="Пауза">Приостановлено</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Описание</label>
              <input type="text" name="description" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Blue Team</label>
              <input type="text" name="blue_team_name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Red Team</label>
              <input type="text" name="red_team_name" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Создать</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function checkAuth() {
      if (!localStorage.accessToken) {
        window.location.href = "login.html";
      } else {
        const user = JSON.parse(localStorage.user);
        document.getElementById('username').innerText = user.email;
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    async function loadSimulations() {
      try {
        const response = await fetch('http://localhost:8000/api/simulations');
        if (!response.ok) throw new Error("Ошибка API");
        const sims = await response.json();
        const container = document.getElementById('simulations-container');
        container.innerHTML = '';

        sims.forEach(sim => {
          container.innerHTML += `
            <div class="col-md-4 mb-3">
              <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                  ${sim.name} <span class="badge bg-secondary float-end">${sim.status}</span>
                </div>
                <div class="card-body d-flex flex-column">
                  <p class="mb-1"><strong>Blue Team:</strong> ${sim.blue_team_name}</p>
                  <p class="mb-2"><strong>Red Team:</strong> ${sim.red_team_name}</p>
                  <p class="small text-muted flex-grow-1">${sim.description}</p>
                  <a href="main-chat.html" class="btn btn-primary w-100 mt-2">Войти в симуляцию</a>
                </div>
              </div>
            </div>
          `;
        });
      } catch (error) {
        console.error(error);
      }
    }

    async function createSimulation(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch('http://localhost:8000/api/simulations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          location.reload();
        } else {
          const err = await response.json();
          alert("Ошибка создания: " + JSON.stringify(err.detail));
        }
      } catch (error) {
        alert("Ошибка сети. Убедитесь, что backend запущен.");
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadSimulations();
    });
  </script>
</body>
</html>
