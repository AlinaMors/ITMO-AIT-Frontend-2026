<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>InjectincoPlayground - Агенты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-warning" href="dashboard.html"><i class="bi bi-robot"></i> InjectincoPlayground</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Дашборд</a></li>
          <li class="nav-item"><a class="nav-link active" href="agents.html">Агенты и Фильтры</a></li>
          <li class="nav-item"><a class="nav-link" href="main-chat.html">Симуляция</a></li>
        </ul>
        <div class="text-light"><span id="username"></span><button onclick="logout()" class="btn btn-danger ms-3">Выход</button></div>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row">
      <aside class="col-md-3">
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h5>Фильтры</h5>
            <div class="mb-3">
              <label class="form-label small">Роль</label>
              <select id="filterRole" class="form-select form-select-sm">
                <option value="Все">Все</option>
                <option value="Attacker">Attacker</option>
                <option value="Defender">Defender</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label small">Агрессия до (<span id="aggroVal">2.0</span>)</label>
              <input type="range" id="filterAggro" class="form-range" min="0" max="2" step="0.1" value="2" oninput="document.getElementById('aggroVal').innerText=this.value">
            </div>
            <button class="btn btn-primary btn-sm w-100" onclick="applyFilters()">Применить</button>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Новый агент</h5>
            <form onsubmit="handleCreateAgent(event)">
              <input type="text" name="name" class="form-control form-control-sm mb-2" placeholder="Имя" required>
              <select name="role" class="form-select form-select-sm mb-2">
                <option value="Attacker">Attacker</option>
                <option value="Defender">Defender</option>
              </select>
              <input type="text" name="description" class="form-control form-control-sm mb-2" placeholder="Промпт" required>
              <input type="text" name="icon" class="form-control form-control-sm mb-2" value="bi-robot" required>
              <input type="number" name="aggressiveness" class="form-control form-control-sm mb-2" step="0.1" value="0.5" required>
              <input type="text" name="skills" class="form-control form-control-sm mb-2" placeholder="Навыки">
              <button type="submit" class="btn btn-success btn-sm w-100">Создать</button>
            </form>
          </div>
        </div>
      </aside>

      <div class="col-md-9">
        <h4 class="mb-3">Библиотека агентов</h4>
        <div class="row" id="agents-container"></div>
      </div>
    </div>
  </div>

  <script>
    let allAgents = [];

    function checkAuth() {
      if (!localStorage.accessToken) window.location.href = "login.html";
      else document.getElementById('username').innerText = JSON.parse(localStorage.user).email;
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    async function loadAgents() {
      const response = await fetch('http://localhost:8000/api/agents');
      allAgents = await response.json();
      renderAgents(allAgents);
    }

    function renderAgents(agents) {
      const container = document.getElementById('agents-container');
      container.innerHTML = '';
      agents.forEach(agent => {
        const color = agent.role === 'Attacker' ? 'text-danger' : 'text-info';
        container.innerHTML += `
          <div class="col-md-4 mb-3">
            <div class="card h-100 border-0 shadow-sm text-center">
              <div class="card-body">
                <i class="bi ${agent.icon} ${color} fs-1"></i>
                <h6>${agent.name}</h6>
                <span class="badge ${agent.role === 'Attacker' ? 'bg-danger' : 'bg-info'}">${agent.role}</span>
                <p class="small text-muted mt-2">${agent.description}</p>
              </div>
            </div>
          </div>`;
      });
    }

    function applyFilters() {
      const role = document.getElementById('filterRole').value;
      const aggro = parseFloat(document.getElementById('filterAggro').value);
      const filtered = allAgents.filter(a => (role === 'Все' || a.role === role) && a.aggressiveness <= aggro);
      renderAgents(filtered);
    }

    async function handleCreateAgent(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const data = Object.fromEntries(formData.entries());
      data.aggressiveness = parseFloat(data.aggressiveness);

      const response = await fetch('http://localhost:8000/api/agents', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        event.target.reset();
        loadAgents();
      } else {
        const errorDetail = await response.json();
        alert("Ошибка: " + JSON.stringify(errorDetail.detail));
      }
    }

    document.addEventListener('DOMContentLoaded', () => { checkAuth(); loadAgents(); });
  </script>
</body>
</html>
