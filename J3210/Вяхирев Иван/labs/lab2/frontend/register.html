<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InjectincoPlayground - Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand text-warning" href="dashboard.html">
        <i class="bi bi-robot"></i> InjectincoPlayground
      </a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Дашборд</a></li>
          <li class="nav-item"><a class="nav-link" href="agents.html">Агенты и Фильтры</a></li>
          <li class="nav-item"><a class="nav-link" href="main-chat.html">Симуляция</a></li>
        </ul>
        <div>
          <a href="login.html" class="btn btn-light">Вход</a>
          <a href="register.html" class="btn btn-primary active">Регистрация</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body text-center">
            <i class="bi bi-person-plus text-primary fs-1"></i>
            <h3 class="mt-2 mb-4">Регистрация</h3>
            <form onsubmit="handleRegister(event)">
              <div class="mb-3 text-start">
                <label class="form-label">Email адрес</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="mb-3 text-start">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-control" name="password" required>
              </div>
              <button class="btn btn-primary w-100 mb-3" type="submit">Создать аккаунт</button>
              <a href="login.html">Войти</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function handleRegister(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const data = {};
      formData.forEach((value, key) => data[key] = value);

      try {
        const response = await fetch('http://localhost:3000/signup', {
          method: "POST",
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
          alert("Регистрация прошла успешно!");
          window.location.href = "login.html";
        } else {
          const err = await response.text();
          alert("Ошибка регистрации: " + err);
        }
      } catch (error) {
        alert("Ошибка сети: сервер авторизации (порт 3000) не запущен.");
      }
    }
  </script>
</body>
</html>
