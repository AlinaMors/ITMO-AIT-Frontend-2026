<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIBloom — Сад нейросетей и данных</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- стили -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    </body>
</head>
<body>

<!-- навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <span class="brand-flower">🏵️</span> AIBloom
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link active mx-2" href="index.html">Поиск</a>
                <a class="nav-link mx-2" href="login.html">Вход</a>
                <a class="btn btn-accent ms-lg-3 shadow-sm" href="register.html">Создать сад</a>
            </div>
        </div>
    </div>
</nav>

<!-- Заголовок страницы -->
<header class="container mt-5">
    <div class="row">
        <div class="col-12 text-center text-lg-start">
            <h1 class="display-5 fw-bold mb-3 flower-dot">Плодородная почва для ваших моделей</h1>
            <p class="lead text-muted">Исследуйте, выращивайте и делитесь лучшими решениями в мире ИИ.</p>
        </div>
    </div>
</header>

<!-- Основной контент (фильтры и поиск) -->
<div class="container my-5">
    <div class="row">

        <!-- Сетка фильтров -->
        <aside class="col-lg-3 mb-4">
            <div class="card p-4 border-0 shadow-sm sticky-lg-top" style="top: 100px;">
                <h5 class="mb-3 fw-bold" style="color: var(--bloom-green);">Параметры роста</h5>
                <form id="filterForm">

                    <!-- Фильтр по Задаче -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Задача (Task)</label>
                        <select id="taskSelect" class="form-select border-0 bg-light">
                            <option value="">Все задачи</option>
                            <option value="text-classification">NLP (Текст)</option>
                            <option value="image-classification">Computer Vision</option>
                            <option value="audio-classification">Audio</option>
                            <option value="reinforcement-learning">Reinforcement Learning</option>
                        </select>
                    </div>

                    <!-- Фильтр по Фреймворку -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Фреймворк</label>
                        <div class="form-check mb-1">
                            <input class="form-check-input fw-check" type="checkbox" id="pt" value="pytorch">
                            <label class="form-check-label small" for="pt">PyTorch</label>
                        </div>
                        <div class="form-check mb-1">
                            <input class="form-check-input fw-check" type="checkbox" id="tf" value="tensorflow">
                            <label class="form-check-label small" for="tf">TensorFlow</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input fw-check" type="checkbox" id="jax" value="jax">
                            <label class="form-check-label small" for="jax">JAX / Flax</label>
                        </div>
                    </div>

                    <!-- Фильтр по Лицензии -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Лицензия</label>
                        <select id="licenseSelect" class="form-select border-0 bg-light">
                            <option value="">Любая лицензия</option>
                            <option value="mit">MIT</option>
                            <option value="apache-2.0">Apache 2.0</option>
                            <option value="cc-by-4.0">Creative Commons</option>
                            <option value="openrail">OpenRail</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 shadow-sm mt-2">Применить фильтры</button>
                </form>
            </div>
        </aside>

        <!-- Сетка результатов поиска -->
        <main class="col-lg-9">
            <div class="input-group mb-5 shadow-sm rounded-pill overflow-hidden bg-white">
                <!-- с id="searchInput" -->
                <input type="text" id="searchInput" class="form-control border-0 px-4 py-3" placeholder="Найдите модель, датасет или автора...">
                <button id="searchBtn" class="btn btn-primary px-4">Поиск</button>
            </div>

            <div class="row" id="model-grid">
                <!-- JS загружает 7 карточек из Hugging Face -->
            </div>
        </main>
    </div>
</div>

<!-- Секция Трендов Hugging Face -->
<section class="container my-5 py-5 border-top">
    <div class="d-flex align-items-center mb-4">
        <h3 class="fw-bold mb-0 flower-dot">Мировые тренды (Hugging Face API)</h3>
        <span class="badge bg-soft-blue text-primary ms-3">Live Data</span>
    </div>

    <div id="hf-trends-grid" class="row">
        <!-- JS вставляет 8 карточек в формате 1 + 3 + 4 -->
        <div class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2 text-muted">Ищем лучшие саженцы нейросетей в мире...</p>
        </div>
    </div>
</section>
