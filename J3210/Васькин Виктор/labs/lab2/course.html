<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс Python | PosiMax</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar py-3" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-white" href="index.html">
                Posi<span class="neon-text">Max</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white fw-bold" href="index.html">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="profile.html">Мой прогресс</a>
                    </li>
                </ul>
                <div class="d-flex flex-column flex-lg-row gap-3 mt-3 mt-lg-0">
                    <a href="profile.html" class="btn btn-outline-light rounded-pill px-4 fw-bold">Личный кабинет</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-3 mb-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-neon text-decoration-none">Каталог</a></li>
                <li class="breadcrumb-item active text-white-50" aria-current="page" id="bcTitle">Загрузка...</li>
            </ol>
        </nav>

        <div class="row g-5">
            <div class="col-12 col-lg-8">
                
                <h1 class="text-white fw-bold mb-3" id="courseTitle">Загрузка...</h1>
                <p class="text-white-50 fs-5 mb-4" id="courseDesc">Пожалуйста, подождите, загружаем данные курса...</p>
                
                <div class="ratio ratio-16x9 rounded-4 overflow-hidden mb-5 border border-secondary shadow-lg">
                    <img src="" id="courseImg" alt="Обложка курса" class="object-fit-cover bg-dark">
                    <div class="d-flex justify-content-center align-items-center position-absolute top-0 start-0 w-100 h-100 bg-dark bg-opacity-50">
                        <button class="btn btn-neon rounded-circle d-flex justify-content-center align-items-center" style="width: 80px; height: 80px;">
                            <span class="fs-1 ms-2">▶</span>
                        </button>
                    </div>
                </div>

                <ul class="nav nav-tabs custom-tabs border-secondary mb-4" id="courseTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active bg-transparent fw-bold" data-bs-toggle="tab" data-bs-target="#desc" type="button">Обзор курса</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link bg-transparent fw-bold" data-bs-toggle="tab" data-bs-target="#program" type="button">Материалы</button>
                    </li>
                </ul>

                <div class="tab-content text-white-50" id="courseTabsContent">
                    <div class="tab-pane fade show active" id="desc" role="tabpanel">
                        <h4 class="text-white mb-3">О курсе</h4>
                        <p id="courseFullDesc">Здесь будет подробное описание курса из базы данных.</p>
                    </div>
                    <div class="tab-pane fade" id="program" role="tabpanel">
                        <h4 class="text-white mb-3">Программа скоро появится</h4>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-lg-4">
                <div class="filter-top-bar p-4 rounded-4 position-sticky" style="top: 100px;">
                    <h2 class="text-white fw-bold mb-3" id="coursePrice">...</h2>
                    
                    <a href="profile.html" class="btn btn-neon w-100 rounded-pill py-3 fw-bold fs-5 mb-3">Начать учиться</a>
                    <button class="btn btn-outline-light w-100 rounded-pill py-2 fw-bold mb-4">В закладки</button>

                    <hr class="border-secondary my-4">
                    
                    <h6 class="text-white fw-bold mb-3">Преподаватель:</h6>
                    <div class="d-flex align-items-center">
                        <img src="" id="teacherAvatar" class="rounded-circle" width="48" height="48" alt="Препод">
                        <div class="ms-3 lh-1">
                            <div class="fw-bold text-white mb-1" id="teacherName">...</div>
                            <div class="text-white-50 small" id="teacherRole">...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
