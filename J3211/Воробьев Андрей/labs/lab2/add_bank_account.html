<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Добавление счёта - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand navbar-brand-custom" href="account.html">
            Мои прекрасные расходы
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="account.html">Обзор</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="search.html">Транзакции</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="dashboard.html">Отчёты</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span>admin@admin.com</span>
                <a href="index.html" class="btn btn-outline-secondary btn-sm fw-bold">Выйти</a>
            </div>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Подключение нового счёта</h1>
        <p class="text-muted">Выберите способ учета</p>
    </div>

    <div class="row g-4">
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Ручной учёт</h2>
                    <p class="text-muted text-center">Вы сами заносите все операции.</p>
                    <form>
                        <div class="mb-3">
                            <label for="ManualAccountName" class="form-label">Название счёта</label>
                            <input type="text" class="form-control" id="ManualAccountName" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-custom">Создать счёт</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Автоматизация</h2>
                    <p class="text-muted text-center">Безопасный импорт транзакций из вашего банка.</p>
                    <form>
                        <div class="mb-3">
                            <label for="ApiAccountName" class="form-label">Название счёта</label>
                            <input type="text" class="form-control" id="ApiAccountName" required>
                        </div>
                        <div class="mb-3">
                            <label for="ApiKey" class="form-label">API Ключ</label>
                            <input type="password" class="form-control" id="ApiKey" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-custom">Подключить по API</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>
<script type="module" src="js/pages/add_bank_account.js"></script>

</body>
</html>
