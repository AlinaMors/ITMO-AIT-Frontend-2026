<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Отчёты - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="postlogin-site-navbar"></div>

<main class="container mt-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="fw-bold mb-0">Аналитика расходов</h2>
        <div class="mt-2 mt-md-0">
            <label>
                <select class="form-select border-primary">
                    <option>Март 2026</option>
                    <option>Февраль 2026</option>
                </select>
            </label>
        </div>
    </div>

    <div class="row g-3 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <small class="fw-bold">ДОХОДЫ</small>
                <div class="fw-bold income-text mt-2">100 000 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <small class="fw-bold">РАСХОДЫ</small>
                <div class="fw-bold expense-text mt-2">50 000 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card profit-balance-card">
                <small class="fw-bold">ЭФФЕКТИВНОСТЬ</small>
                <div class="fw-bold mt-2">50 % в плюсе</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Расходы по категориям</h5>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span>Продукты</span>
                            <span class="fw-bold">20 000 ₽</span>
                        </div>
                        <div class="progress">
                            <div class="progress-bar bg-success" style="width: 40%;"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span>Транспорт</span>
                            <span class="fw-bold">15 000 ₽</span>
                        </div>
                        <div class="progress">
                            <div class="progress-bar bg-info" style="width: 30%;"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span>Жилье</span>
                            <span class="fw-bold">10 000 ₽</span>
                        </div>
                        <div class="progress">
                            <div class="progress-bar bg-warning" style="width: 20%;"></div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span>Развлечения</span>
                            <span class="fw-bold">5 000 ₽</span>
                        </div>
                        <div class="progress">
                            <div class="progress-bar bg-danger" style="width: 10%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Сравнительная статистика</h5>
                    <ul class="list-unstyled">
                        <li class="mb-3 d-flex align-items-start">
                            <span class="me-2">💡</span>
                            <span>Ваши расходы сейчас равны расходам в прошлом месяце.</span>
                        </li>
                        <li>
                            <img src="img/chart.png" alt="График расходов" class="img-fluid rounded">
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>

</body>
</html>
