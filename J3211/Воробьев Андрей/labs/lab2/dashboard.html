<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Отчёты - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="postlogin-site-navbar"></div>

<main class="container mt-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="fw-bold mb-0">Аналитика расходов</h2>
        <div class="mt-2 mt-md-0">
            <label>
                <select class="form-select border-primary" id="dashboardPeriod">
                    <option>Загрузка...</option>
                </select>
            </label>
        </div>
    </div>

    <div class="row g-3 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <small class="fw-bold">ДОХОДЫ</small>
                <div class="fw-bold income-text mt-2" id="dashboardIncome">0 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <small class="fw-bold">РАСХОДЫ</small>
                <div class="fw-bold expense-text mt-2" id="dashboardExpense">0 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card profit-balance-card">
                <small class="fw-bold">ЭФФЕКТИВНОСТЬ</small>
                <div class="fw-bold mt-2" id="dashboardEfficiency">-</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Расходы по категориям</h5>
                    <div id="categoriesBreakdown">
                        <p class="text-muted mb-0">Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-3">Сравнительная статистика</h5>
                    <p id="dashboardInsight" class="mb-4 text-muted">Загрузка...</p>
                    <div id="monthlyChart"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>
<script type="module" src="js/pages/dashboard.js"></script>

</body>
</html>
