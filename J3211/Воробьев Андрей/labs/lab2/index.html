<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Войти - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav id="prelogin-site-navbar"></nav>

<main class="container mt-4">
    <div class="row align-items-center justify-content-between g-4">
        <div class="col-12 col-lg-6">
            <h1 class="fw-bold hero-title">
                Мои прекрасные расходы
            </h1>
            <p class="lead hero-subtitle px-3 px-lg-0">
                Ваш надёжный помощник в управлении личными финансами и бюджетом.
            </p>
            <div class="features-grid">
                <div class="feature-tile">
                    <span>Личный кабинет</span>
                </div>
                <div class="feature-tile">
                    <span>Поиск и фильтрация транзакций</span>
                </div>
                <div class="feature-tile">
                    <span>Отчёты и прогнозы</span>
                </div>
                <div class="feature-tile">
                    <span>Интеграция с аккаунтами</span>
                </div>
            </div>
        </div>
        <div class="col-12 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Вход в аккаунт</h2>
                    <form>
                        <div class="mb-3">
                            <label for="InputEmail" class="form-label">Email адрес</label>
                            <input type="email" class="form-control" id="InputEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="InputPassword" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="InputPassword" required>
                        </div>
                        <div class="d-flex justify-content-end mb-3">
                            <a href="forgot_password.html" class="small text-decoration-none">Забыли пароль?</a>
                        </div>
                        <div class="d-grid gap-4">
                            <button type="submit" class="btn btn-primary btn-custom">Войти</button>
                        </div>
                    </form>
                    <div class="d-flex flex-column flex-sm-row align-items-center gap-3 mt-3 mx-sm-5">
                        <span class="mb-0 text-nowrap">Нет аккаунта?</span>
                        <a href="register.html" class="btn btn-outline-secondary btn-custom flex-grow-1 w-100 w-sm-auto">
                            Зарегистрируйтесь!
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>
<script type="module" src="js/pages/login.js"></script>

</body>
</html>
