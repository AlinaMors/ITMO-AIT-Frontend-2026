<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Регистрация - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav id="prelogin-site-navbar"></nav>

<main class="container mt-4">
    <div class="row align-items-center justify-content-between g-4">
        <div class="col-12 col-lg-6">
            <h1 class="fw-bold hero-title">
                Присоединяйтесь к нам!
            </h1>
            <p class="lead hero-subtitle px-3 px-lg-0">
                Создайте аккаунт, чтобы начать управлять своими финансами вместе с "Мои прекрасные расходы". Это быстро
                и бесплатно!
            </p>
        </div>
        <div class="col-12 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Регистрация</h2>
                    <form onsubmit="register(event)">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email адрес</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" name="password" autocomplete="off" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Подтверждение пароля</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" autocomplete="off" required>
                        </div>
                        <div class="d-grid gap-4">
                            <button type="submit" class="btn btn-primary btn-custom">Зарегистрироваться</button>
                        </div>
                        <div class="d-flex flex-column flex-sm-row align-items-center gap-3 mt-3 mx-sm-5">
                            <span class="mb-0 text-nowrap">Уже есть аккаунт?</span>
                            <a href="index.html" class="btn btn-outline-secondary btn-custom flex-grow-1 w-100 w-sm-auto">
                                Войти
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>
<script type="module" src="js/pages/register.js"></script>

</body>
</html>
