<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Забыли пароль? - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav id="prelogin-site-navbar"></nav>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4" id="forgot-form-title">Восстановление пароля</h2>
                    <p class="mb-4">
                        Введите ваш email, чтобы узнать инструкции по восстановлению пароля.
                    </p>
                    <form onsubmit="forgotPassword(event)" aria-labelledby="forgot-form-title">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email адрес</label>
                            <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                        </div>
                        <div class="d-grid gap-4">
                            <button type="submit" class="btn btn-primary btn-custom">Отправить</button>
                        </div>
                    </form>
                    <div class="d-grid gap-3 mt-3">
                        <a href="index.html" class="btn btn-outline-secondary btn-custom">
                            Вход
                        </a>
                        <a href="register.html" class="btn btn-outline-secondary btn-custom">
                            Регистрация
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>
<script type="module" src="js/pages/forgot_password.js"></script>

</body>
</html>
