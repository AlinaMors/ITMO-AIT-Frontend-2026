<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Личный кабинет - Мои прекрасные расходы</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="postlogin-site-navbar"></div>

<main class="container mt-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-2">
        <div>
            <h1 class="fw-bold mb-0">Личный кабинет</h1>
            <p class="text-muted mb-0">Статистика за <strong>Март 2026</strong></p>
        </div>
    </div>

    <div class="row g-3 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <small class="fw-bold">ДОХОДЫ</small>
                <div class="fw-bold income-text mt-2" id="incomeValue">0 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <small class="fw-bold">РАСХОДЫ</small>
                <div class="fw-bold expense-text mt-2" id="expenseValue">0 ₽</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card balance-card">
                <small class="fw-bold">БАЛАНС</small>
                <div class="fw-bold mt-2" id="balanceValue">0 ₽</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card card-dashboard shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h5 fw-bold mb-3">Мои счета</h2>
                    <div class="accounts-list-container mb-3">
                        <div class="list-group list-group-flush" id="accountsList" aria-live="polite"></div>
                    </div>
                    <div class="text-center mt-2">
                        <a href="add_bank_account.html" class="btn btn-outline-secondary btn-custom">
                            Добавить новый счёт
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-dashboard shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="h5 fw-bold mb-4">История операций</h2>
                    <div class="table-responsive">
                        <table class="table table-custom align-middle">
                            <caption class="visually-hidden">Последние операции по счетам пользователя</caption>
                            <thead>
                            <tr>
                                <th scope="col">Дата</th>
                                <th scope="col">Категория</th>
                                <th scope="col">Счёт</th>
                                <th scope="col" class="text-end">Сумма</th>
                            </tr>
                            </thead>
                            <tbody id="recentTransactionsBody" aria-live="polite">
                            <tr>
                                <td colspan="4" class="text-center text-muted">Загрузка...</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-center mt-2">
                        <a href="search.html" class="btn btn-outline-secondary btn-custom">
                            Смотреть все транзакции
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="js/core/includes.js"></script>
<script type="module" src="js/pages/account.js"></script>

</body>
</html>
