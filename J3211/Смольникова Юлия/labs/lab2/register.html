<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Learnify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-xl-5">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold">Создать аккаунт</h2>
                        <p class="text-center text-muted mb-4">
                            Регистрируйся и сразу начинай учиться или создавать курсы
                        </p>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Имя</label>
                                <input type="text" name="name" class="form-control form-control-lg" placeholder="Иван Иванов" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Пароль</label>
                                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                            </div>

                            <!-- Роль убрана — как на Stepik -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary-custom btn-lg">
                                    Зарегистрироваться
                                </button>
                            </div>
                        </form>

                        <div id="formSuccess" class="alert alert-success mt-3 text-center" style="display: none;"></div>
                        <div id="formError" class="alert alert-danger mt-3 text-center" style="display: none;"></div>

                        <div class="text-center mt-4">
                            <p class="mb-0">
                                Уже есть аккаунт? 
                                <a href="login.html" class="text-primary">Войти</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
